name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/finclara_ci
      DIRECT_URL: postgresql://user:password@localhost:5432/finclara_ci
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      GEMINI_API_KEY: placeholder-gemini-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Checagem de tipos
        run: npx tsc --noEmit

      - name: Testes unitários
        run: npm run test

      - name: Build de produção
        run: npm run build
